# Server host/interface to bind to. Default is empty ("") to bind all interfaces (IPv4 + IPv6).
# Use "127.0.0.1" or "localhost" to restrict access to local machine only.
host: ""

# Server port
port: 8317

# TLS settings for HTTPS. When enabled, the server listens with the provided certificate and key.
tls:
  enable: false
  cert: ""
  key: ""

# Management API settings
remote-management:
  # Whether to allow remote (non-localhost) management access.
  # When false, only localhost can access management endpoints (a key is still required).
  allow-remote: false

  # Management key. If a plaintext value is provided here, it will be hashed on startup.
  # All management requests (even from localhost) require this key.
  # Leave empty to disable the Management API entirely (404 for all /v0/management routes).
  secret-key: ""

# Authentication directory (supports ~ for home directory)
auth-dir: "~/.cli-proxy-api"

# Background credential refresh is disabled by the service.
# Credentials are refreshed only by explicit management actions for a selected auth file.
# oauth-refresh:
#   enabled: false
#   on-startup: true
#   batch-size: 2

# Optional server-side model prices used for usage cost display and API key spend quotas.
# Values are USD per 1M tokens.
# model-prices:
#   gpt-5.4:
#     prompt: 2.5
#     completion: 15
#     cache: 0.25
#   gpt-5.5:
#     prompt: 5
#     completion: 30
#     cache: 0.25
#   default:
#     prompt: 1
#     completion: 2
#     cache: 0.1

# API keys for client authentication. Add your own high-entropy keys.
# String entries keep the legacy unlimited format. Object entries can restrict
# visible models and USD spend quota. Quota windows are UTC and use completed usage records.
# Example:
# api-keys:
#   - "sk-client-unlimited"
#   - api-key: "sk-client-limited"
#     disabled: false
#     allowed-models: ["gpt-*", "claude-*"]
#     excluded-models: ["gpt-image-*"]
#     quota:
#       daily-cost: 1.5
#       monthly-cost: 30
#       total-cost: 100
api-keys: []

# Enable debug logging
debug: false

# Enable pprof HTTP debug server (host:port). Keep it bound to localhost for safety.
pprof:
  enable: false
  addr: "127.0.0.1:8316"

# When true, disable high-overhead HTTP middleware features to reduce per-request memory usage under high concurrency.
commercial-mode: false

# When true, write application logs to rotating files instead of stdout
logging-to-file: false

# Maximum total size (MB) of log files under the logs directory. When exceeded, the oldest log
# files are deleted until within the limit. Set to 0 to disable.
logs-max-total-size-mb: 0

# Maximum number of error log files retained when request logging is disabled.
# When exceeded, the oldest error log files are deleted. Default is 10. Set to 0 to disable cleanup.
error-logs-max-files: 10

# When false, disable in-memory usage statistics aggregation
usage-statistics-enabled: false

# Maximum detailed usage records retained per API/model in memory. Default is 100. Set to 0 to keep all details.
usage-detail-retention-limit: 100

# How long (in seconds) Redis usage queue items are retained in memory for the RESP interface (LPOP/RPOP).
# Default: 60. Max: 3600.
redis-usage-queue-retention-seconds: 60

# Optional Redis-backed runtime state persistence. When enabled, usage statistics,
# per-auth request counters/recent buckets, and quota cooldown state are restored
# after process restarts.
redis:
  enabled: false
  # Either set url, or set addr/username/password/db below.
  url: ""
  addr: "127.0.0.1:6379"
  username: ""
  password: ""
  db: 0
  key-prefix: "cliproxyapi"
  # Connection pool tuning. Defaults preserve go-redis behavior, which scales
  # with runtime.GOMAXPROCS — too small in CPU-quota'd containers, too large
  # on big hosts. Tune explicitly for production:
  # pool-size: 64           # Default: 10 × GOMAXPROCS.
  # min-idle-conns: 8       # Default: 0. Keeps a warm pool to avoid handshake spikes.
  # dial-timeout-ms: 5000   # Default: 5000.
  # read-timeout-ms: 3000   # Default: 3000. Caps blocking reads from a stalled Redis.
  # write-timeout-ms: 3000  # Default: matches read-timeout.
  # pool-timeout-ms: 4000   # Default: read-timeout + 1s. Caps wait for a free conn.
  # max-retries: 3          # Default: 3. Set -1 to disable in-client retries.

# Proxy URL. Supports socks5/http/https protocols. Example: socks5://user:pass@192.168.1.1:1080/
# Per-entry proxy-url also supports "direct" or "none" to bypass both the global proxy-url and environment proxies explicitly.
proxy-url: ""

# Proxy pool assigns stable Redis-backed proxy leases to auth-file credentials
# that do not have an explicit proxy_url/proxy-url configured. Redis must be enabled.
proxy-pool:
  enabled: false
  state-store: "redis"
  # Keep quota/cooldown accounts on their original IP by default.
  release-on-auth-cooldown: false
  release-on-auth-disabled: true
  proxy-failure-threshold: 3
  proxy-failure-cooldown: "10m"
  proxies: []
  # - "http://[2603:c021:800e:c68f:0:1043:78ac:85e6]:10808"
  # - "http://[2603:c021:800e:c68f:0:1340:999d:d790]:10808"

# When true, unprefixed model requests only use credentials without a prefix (except when prefix == model name).
force-model-prefix: false

# When true, forward filtered upstream response headers to downstream clients.
# Default is false (disabled).
passthrough-headers: false

# Number of times to retry a request. Retries will occur if the HTTP response code is 403, 408, 500, 502, 503, or 504.
request-retry: 3

# Maximum number of different credentials to try for one failed request.
# Set to 0 to keep legacy behavior (try all available credentials).
max-retry-credentials: 0

# Maximum wait time in seconds for a cooled-down credential before triggering a retry.
max-retry-interval: 30

# When true, disable auth/model cooldown scheduling globally (prevents blackout windows after failure states).
disable-cooling: false

# disable-image-generation supports: false (default), true, or "chat".
# - true: disable image_generation everywhere (also returns 404 for /v1/images/generations, /v1/images/edits, and /v1/images/variations).
# - "chat": disable image_generation injection on non-images endpoints, but keep /v1/images/generations, /v1/images/edits, and /v1/images/variations enabled.
disable-image-generation: false

# Base model used when proxying gpt-image-2 via the hosted image_generation tool (Responses API).
# Must start with "gpt-" (case-insensitive). If unset or invalid, defaults to "gpt-5.4-mini".
# gpt-image-2-base-model: "gpt-5.4-mini"

# Core auth auto-refresh worker pool size (OAuth/file-based auth token refresh).
# When > 0, overrides the default worker count (16).
# auth-auto-refresh-workers: 16

# Quota exceeded behavior
quota-exceeded:
  switch-project: true # Whether to automatically switch to another project when a quota is exceeded
  switch-preview-model: true # Whether to automatically switch to a preview model when a quota is exceeded

# Routing strategy for selecting credentials when multiple match.
routing:
  strategy: "round-robin" # round-robin (default), fill-first
  # Enable universal session-sticky routing for all clients.
  # Session IDs are extracted from: metadata.user_id (Claude Code session format),
  # X-Session-ID, Session_id (Codex),
  # X-Client-Request-Id (PI), metadata.user_id, prompt_cache_key,
  # conversation_id, or first few messages hash.
  # Automatic failover is always enabled when bound auth becomes unavailable.
  # With session-affinity enabled, new sessions are assigned by
  # round-robin across same-priority auth files, then remain sticky for the TTL.
  session-affinity: true # default: false
  # How long session-to-auth bindings are retained. Default: 1h
  session-affinity-ttl: "1h"

# Codex provider behavior.
codex:
  # When true, and routing.strategy is fill-first or routing.session-affinity is true,
  # remap Codex prompt_cache_key and installation identity per selected auth.
  # Some superstitious users believe request tracking identifiers can be used
  # as evidence for TOS enforcement bans; this option only satisfies those odd concerns.
  identity-confuse: false

# When true, enable authentication for the WebSocket API (/v1/ws).
ws-auth: true

# When > 0, emit blank lines every N seconds for non-streaming responses to prevent idle timeouts.
nonstream-keepalive-interval: 0

# Image stream behavior for /v1/images/* SSE responses. Defaults are disabled.
# Set keepalive to 10 and data timeout to 900 to mirror sub2api's long-running image stream behavior.
image-stream-keepalive-seconds: 0
image-stream-data-interval-timeout-seconds: 0

# Streaming behavior (SSE keep-alives + safe bootstrap retries).
# streaming:
#   keepalive-seconds: 15   # Default: 0 (disabled). <= 0 disables keep-alives.
#   bootstrap-retries: 1    # Default: 0 (disabled). Retries before first byte is sent.

# Server-side resource limits and backpressure. Defaults preserve legacy
# unlimited behavior. Set max-in-flight-requests in production to prevent a
# single bad upstream or noisy tenant from exhausting goroutines / file
# descriptors. Excess requests fail fast with HTTP 503 + Retry-After.
# limits:
#   max-in-flight-requests: 0   # Default: 0 (disabled). Try 256–1024 in prod.
#   retry-after-seconds: 5      # Advertised on 503 responses; 0 omits the header.

# Codex API keys
# codex-api-key:
#   - api-key: "sk-atSM..."
#     prefix: "test" # optional: require calls like "test/gpt-5-codex" to target this credential
#     disable-cooling: false # optional: per-auth override for auth/model cooldown scheduling
#     pool-mode: false # optional: retry selected Codex API key errors 3 times before failover
#     base-url: "https://www.example.com" # use the custom codex API endpoint
#     headers:
#       X-Custom-Header: "custom-value"
#     proxy-url: "socks5://proxy.example.com:1080" # optional: per-key proxy override
#     # proxy-url: "direct" # optional: explicit direct connect for this credential
#     models:
#       - name: "gpt-5-codex"   # upstream model name
#         alias: "codex-latest" # client alias mapped to the upstream model
#     excluded-models:
#       - "gpt-5.1"         # exclude specific models (exact match)
#       - "gpt-5-*"         # wildcard matching prefix (e.g. gpt-5-medium, gpt-5-codex)
#       - "*-mini"          # wildcard matching suffix (e.g. gpt-5-codex-mini)
#       - "*codex*"         # wildcard matching substring (e.g. gpt-5-codex-low)

# Claude API keys
# claude-api-key:
#   - api-key: "sk-atSM..." # use the official claude API key, no need to set the base url
#   - api-key: "sk-atSM..."
#     prefix: "test" # optional: require calls like "test/claude-sonnet-latest" to target this credential
#     disable-cooling: false # optional: per-auth override for auth/model cooldown scheduling
#     base-url: "https://www.example.com" # use the custom claude API endpoint
#     headers:
#       X-Custom-Header: "custom-value"
#     proxy-url: "socks5://proxy.example.com:1080" # optional: per-key proxy override
#     # proxy-url: "direct" # optional: explicit direct connect for this credential
#     models:
#       - name: "claude-3-5-sonnet-20241022" # upstream model name
#         alias: "claude-sonnet-latest"      # client alias mapped to the upstream model
#     excluded-models:
#       - "claude-opus-4-5-20251101" # exclude specific models (exact match)
#       - "claude-3-*"               # wildcard matching prefix (e.g. claude-3-7-sonnet-20250219)
#       - "*-thinking"               # wildcard matching suffix (e.g. claude-opus-4-5-thinking)
#       - "*haiku*"                  # wildcard matching substring (e.g. claude-3-5-haiku-20241022)
#     cloak:                         # optional: request cloaking for non-Claude-Code clients
#       mode: "auto"                 # "auto" (default): cloak only when client is not Claude Code
#                                    # "always": always apply cloaking
#                                    # "never": never apply cloaking
#       strict-mode: false           # false (default): prepend Claude Code prompt to user system messages
#                                    # true: strip all user system messages, keep only Claude Code prompt
#       sensitive-words:             # optional: words to obfuscate with zero-width characters
#         - "API"
#         - "proxy"
#       cache-user-id: true          # optional: default is false; set true to reuse cached user_id per API key instead of generating a random one each request
#     experimental-cch-signing: false # optional: default is false; when true, sign the final /v1/messages body using the current Claude Code cch algorithm
#                                     # keep this disabled unless you explicitly need the behavior, so upstream seed changes fall back to legacy proxy behavior

# Default headers for Claude API requests. Update when Claude Code releases new versions.
# In legacy mode, user-agent/package-version/runtime-version/timeout are used as fallbacks
# when the client omits them, while OS/arch remain runtime-derived. When
# stabilize-device-profile is enabled, OS/arch stay pinned to the baseline values below,
# while user-agent/package-version/runtime-version seed a software fingerprint that can
# still upgrade to newer official Claude client versions.
# claude-header-defaults:
#   user-agent: "claude-cli/2.1.44 (external, sdk-cli)"
#   package-version: "0.74.0"
#   runtime-version: "v24.3.0"
#   os: "MacOS"
#   arch: "arm64"
#   timeout: "600"
#   stabilize-device-profile: false  # optional, default false; set true to enable per-auth/API-key fingerprint pinning

# Default headers for Codex requests.
# When configured, `user-agent` is used as the fixed Codex UA and overrides
# generated or credential-provided defaults. It applies to both file-backed/OAuth
# and codex-api-key Codex requests; `beta-features` only applies to websocket
# requests for file-backed/OAuth Codex sessions.
# codex-header-defaults:
#   user-agent: "codex_cli_rs/0.134.0-alpha.3 (Linux; x86_64) xterm-256color"
#   beta-features: "multi_agent"

# OpenAI compatibility providers
# openai-compatibility:
#   - name: "openrouter" # The name of the provider; it will be used in the user agent and other places.
#     prefix: "test" # optional: require calls like "test/kimi-k2" to target this provider's credentials
#     base-url: "https://openrouter.ai/api/v1" # The base URL of the provider.
#     disable-cooling: false # optional: per-provider override for auth/model cooldown scheduling
#     pool-mode: false # optional: retry any selected provider error 3 times before pooled model/auth fallback
#     headers:
#       X-Custom-Header: "custom-value"
#     api-key-entries:
#       - api-key: "sk-or-v1-...b780"
#         proxy-url: "socks5://proxy.example.com:1080" # optional: per-key proxy override
#         # proxy-url: "direct" # optional: explicit direct connect for this credential
#       - api-key: "sk-or-v1-...b781" # without proxy-url
#     models: # The models supported by the provider.
#       - name: "moonshotai/kimi-k2:free" # The actual model name.
#         alias: "kimi-k2"               # The alias used in the API.
#         image: false                   # optional: set true to allow this model on /v1/images/generations and /v1/images/edits
#         thinking:                      # optional: omit to default to levels ["low","medium","high"]
#           levels: ["low", "medium", "high"]
#       # You may repeat the same alias to build an internal model pool.
#       # The client still sees only one alias in the model list.
#       # Requests to that alias will round-robin across the upstream names below,
#       # and if the chosen upstream fails before producing output, the request will
#       # continue with the next upstream model in the same alias pool.
#       - name: "deepseek-v3.1"
#         alias: "claude-opus-4.66"
#       - name: "glm-5"
#         alias: "claude-opus-4.66"
#       - name: "kimi-k2.5"
#         alias: "claude-opus-4.66"

# Global OAuth model name aliases (per channel)
# These aliases rename model IDs for both model listing and request routing.
# Supported channels: claude, codex, kimi, xai.
# NOTE: Aliases do not apply to codex-api-key, claude-api-key, or openai-compatibility.
# NOTE: Because aliases affect the merged /v1 model list and merged request routing, overlapping
# client-visible names can become ambiguous across providers. /api/provider/{provider}/... helps
# you select the protocol surface, but inference backend selection can still follow the resolved
# model/alias. For strict backend pinning, use unique aliases/prefixes or avoid overlapping names.
# You can repeat the same name with different aliases to expose multiple client model names.
# oauth-model-alias:
#   claude:
#     - name: "claude-sonnet-4-5-20250929"
#       alias: "cs4.5"
#   codex:
#     - name: "gpt-5"
#       alias: "g5"
#   kimi:
#     - name: "kimi-k2.5"
#       alias: "k2.5"
#   xai:
#     - name: "grok-4.3"
#       alias: "grok-latest"

# OAuth provider excluded models
# oauth-excluded-models:
#   claude:
#     - "claude-3-5-haiku-20241022"
#   codex:
#     - "gpt-5-codex-mini"
#   kimi:
#     - "kimi-k2-thinking"
#   xai:
#     - "grok-3-mini"

# Optional payload configuration
# payload:
#   default: # Default rules only set parameters when they are missing in the payload.
#     - models:
#         - name: "gpt-*" # Supports wildcards (e.g., "gpt-*")
#           protocol: "codex" # restricts the rule to a specific protocol, options: openai, responses, claude, codex
#           from-protocol: "responses" # restricts the rule to the source protocol, options: openai, responses, claude, codex
#           headers: # all configured request headers must match; values support "*" wildcards
#             X-Client-Tier: "tenant-*-region-*"
#           match: # all payload JSON paths must equal the configured values
#             - "metadata.client": "codex"
#           not-match: # payload JSON paths must not equal the configured values
#             - "metadata.mode": "dev"
#           exist: # all payload JSON paths must exist and not be null
#             - "tools.#(type==\"web_search\").type"
#           not-exist: # all payload JSON paths must be missing or null
#             - "metadata.disable_payload"
#       params: # JSON path (gjson/sjson syntax) -> value
#         "reasoning.effort": "high"
#   default-raw: # Default raw rules set parameters using raw JSON when missing (must be valid JSON).
#     - models:
#         - name: "gpt-*" # Supports wildcards (e.g., "gpt-*")
#           protocol: "codex" # restricts the rule to a specific protocol, options: openai, responses, claude, codex
#       params: # JSON path (gjson/sjson syntax) -> raw JSON value (strings are used as-is, must be valid JSON)
#         "response_format": "{\"type\":\"json_schema\",\"json_schema\":{\"name\":\"answer\",\"schema\":{\"type\":\"object\"}}}"
#   override: # Override rules always set parameters, overwriting any existing values.
#     - models:
#         - name: "gpt-*" # Supports wildcards (e.g., "gpt-*")
#           protocol: "codex" # restricts the rule to a specific protocol, options: openai, responses, claude, codex
#       params: # JSON path (gjson/sjson syntax) -> value
#         "reasoning.effort": "high"
#   override-raw: # Override raw rules always set parameters using raw JSON (must be valid JSON).
#     - models:
#         - name: "gpt-*" # Supports wildcards (e.g., "gpt-*")
#           protocol: "codex" # restricts the rule to a specific protocol, options: openai, responses, claude, codex
#       params: # JSON path (gjson/sjson syntax) -> raw JSON value (strings are used as-is, must be valid JSON)
#         "response_format": "{\"type\":\"json_schema\",\"json_schema\":{\"name\":\"answer\",\"schema\":{\"type\":\"object\"}}}"
#   filter: # Filter rules remove specified parameters from the payload.
#     - models:
#         - name: "gpt-*" # Supports wildcards (e.g., "gpt-*")
#           protocol: "codex" # restricts the rule to a specific protocol, options: openai, responses, claude, codex
#       params: # JSON paths (gjson/sjson syntax) to remove from the payload
#         - "reasoning.effort"
#         - "response_format"
